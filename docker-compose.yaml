services:
  falkordb:
    image: falkordb/falkordb-server:latest
    container_name: falkordb-server
    ports:
      - "6379:6379"
    volumes:
      - falkordb_data:/data
      - ./falkordb.conf:/etc/falkordb/falkordb.conf:ro
    environment:
      - REDIS_ARGS=/etc/falkordb/falkordb.conf
      - FALKORDB_ARGS=THREAD_COUNT 4 MAX_QUEUED_QUERIES 500 NODE_CREATION_BUFFER 16384
    command: [ "redis-server", "/etc/falkordb/falkordb.conf" ]

  falkordb-browser:
    image: falkordb/falkordb-browser:latest
    container_name: falkordb-browser
    ports:
      - "3000:3000"
    depends_on:
      - falkordb
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smart_agent_dev
    ports:
      - "4000:4000"
    env_file:
      - .env
    volumes:
      - ./:/app
    depends_on:
      - falkordb

volumes:
  falkordb_data:
