<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Smart Agent</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;500&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/style.css" />
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <div class="sb-header">
      <img src="/assets/icon.png" class="sb-logo" alt="Smart Agent" />
      <span class="sb-title">Smart Agent</span>
    </div>
    <button class="sb-new-btn" id="new-chat-btn">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      New Conversation
    </button>
    <div class="sb-section-label">Conversations</div>
    <div id="conv-list"></div>
    <div id="docs-section">
      <div class="sb-section-label">Documents</div>
      <label class="upload-area" for="file-input" id="upload-label">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M7 9V2M4 5l3-3 3 3M2 10v1.5A.5.5 0 002.5 12h9a.5.5 0 00.5-.5V10"
            stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span id="upload-label-text">Browse files</span>
      </label>
      <input type="file" id="file-input" accept=".pdf,.txt,.md" />
      <div id="doc-list"></div>
    </div>
  </aside>

  <main id="main">
    <div id="topbar">
      <div class="topbar-left">
        <div class="topbar-chat-name" id="topbar-name">Smart Agent</div>
        <div class="topbar-chat-id" id="topbar-id">no conversation selected</div>
      </div>
      <div class="topbar-right">
        <div class="status-badge"><div class="status-dot"></div>online</div>
      </div>
    </div>
    
    <div id="main-scroll">
      <div id="empty-state">
        <div class="empty-icon">_</div>
        <div class="empty-title">No conversation selected</div>
        <div class="empty-sub">Create a new conversation to get started.</div>
      </div>

      <div id="chat-area" style="display:none">
        <div id="messages"></div>
      </div>

      <div id="table-area" style="display:none">
        <div class="section-header">
          <div class="sh-left">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2.5 3.5h9m-9 3.5h9m-9 3.5h9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            <span class="sh-title">Document Intelligence</span>
          </div>
          <div class="sh-right">
            <button class="table-btn" onclick="document.getElementById('file-input').click()">
              <svg width="12" height="12" viewBox="0 0 14 14" fill="none"><path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
              Add documents
            </button>
          </div>
        </div>
        <div class="table-card">
          <table id="doc-table">
            <thead>
              <tr>
                <th>Document</th>
                <th>Date</th>
                <th>Type</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="doc-table-body">
              <!-- Rows injected by script.js -->
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <div id="input-area">
      <div class="input-wrap">
        <input type="file" id="image-input" accept="image/*" />
        <div class="composer-main">
          <div id="image-attachment-chip" class="attachment-chip" hidden>
            <div class="attachment-chip-preview" aria-hidden="true"></div>
            <button id="clear-image-btn" type="button" aria-label="Remove image attachment" title="Remove image">
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true">
                <path d="M3 3l6 6M9 3L3 9" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
              </svg>
            </button>
          </div>
          <div class="composer-row">
            <button id="attach-image-btn" type="button" aria-label="Attach image" title="Attach image">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <path d="M5.5 8.5l4.6-4.6a2.75 2.75 0 113.9 3.9l-6.18 6.18a4 4 0 11-5.66-5.66l5.66-5.66"
                  stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
            <textarea id="msg-input" placeholder="Ask anything…" rows="1"></textarea>
            <button id="send-btn" disabled>
              <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
                <path d="M7.5 2L7.5 13M3 6.5L7.5 2L12 6.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>
<div id="toast-container"></div>

<script src="/script.js"></script>
</body>
</html>
